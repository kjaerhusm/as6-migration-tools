name: Build and Release (timestamp version)

permissions:
  contents: write

concurrency:
  group: as6-migration-tools-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - id: ver
        name: Compute release version (Europe/Copenhagen)
        shell: bash
        run: |
          TZ="Europe/Copenhagen"
          VERSION=$(date +'%Y%m%d_%H%M')   # e.g. 20250827_1101
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed version: $VERSION"

    build:
    needs: prepare
    runs-on: windows-latest
    outputs:
      built_sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Write version.txt for runtime embedding
        shell: pwsh
        run: |
          '${{ needs.prepare.outputs.version }}' | Set-Content -Encoding utf8 version.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: pyinstaller --noconfirm gui_launcher.spec

      - name: Zip only the EXE (exclude version.txt)
        shell: pwsh
        run: |
          if (!(Test-Path "dist\as6-migration-tools.exe")) {
            Write-Error "EXE not found in dist"
          }
          if (Test-Path "dist\as6-migration-tools.zip") {
            Remove-Item "dist\as6-migration-tools.zip" -Force
          }
          Compress-Archive -Path "dist\as6-migration-tools.exe" -DestinationPath "dist\as6-migration-tools.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/as6-migration-tools.zip

      - name: Capture built commit SHA
        id: meta
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    needs: [build, prepare]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.built_sha }}
          fetch-depth: 0

      # Sanity check: simulate GitHub's auto "Source code.zip"
      - name: Sanity check auto-archive will have content
        run: |
          git archive --format=zip -o /tmp/auto.zip ${{ needs.build.outputs.built_sha }}
          unzip -l /tmp/auto.zip
          COUNT=$(unzip -Z1 /tmp/auto.zip | wc -l)
          if [ "$COUNT" -lt 5 ]; then
            echo "Auto-generated archive looks too small (files: $COUNT). Check .gitattributes export-ignore rules."
            exit 1
          fi

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Create GitHub Release (versioned tag from timestamp)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          target_commitish: ${{ needs.build.outputs.built_sha }}
          name: "AS4 to AS6 Migration Tools ${{ needs.prepare.outputs.version }}"
          make_latest: true
          body: |
            ✅ This release contains:
            - The latest GUI tool (`as6-migration-tools.zip`)
            - Auto-generated source archives by GitHub (see "Source code" links)
          files: |
            release/as6-migration-tools.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
