name: Build, Tag and Release

on:
  push:
    branches: [ main ]

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4

      - id: bump
        name: Read and bump version
        run: |
          VERSION=$(cat version.txt)
          NEW_VERSION=$((VERSION + 1))
          echo $NEW_VERSION > version.txt
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Validate version
        run: |
          echo "Version is = '${{ steps.bump.outputs.new_version }}'"
          if [ -z "${{ steps.bump.outputs.new_version }}" ]; then
            echo "Version empty! Stopping."
            exit 1
          fi

      - name: Commit bumped version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add version.txt
          git commit -m "Bump version to v${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create Git tag
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}

  build:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - run: pip install pyinstaller
      - run: pyinstaller --noconfirm gui_launcher.spec
      - name: Rename with version
        run: ren dist\as6-migration-tools.exe as6-migration-tools-v${{ needs.prepare.outputs.version }}.exe
      - name: Zip EXE
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/as6-migration-tools-v${{ needs.prepare.outputs.version }}.exe" `
                           -DestinationPath "dist/as6-migration-tools-v${{ needs.prepare.outputs.version }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          files: |
            release/*.zip

  cleanup:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: Nats-ji/delete-old-releases@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          keep-count: 1
          keep-old-minor-releases: false
