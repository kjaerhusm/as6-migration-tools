name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Executable
    runs-on: windows-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter

      # Build the executable with PyInstaller
      # (Update filename/spec if needed)
      - name: Build with PyInstaller
        run: pyinstaller as6_migration.py --onefile

      # Create a zip archive containing the .exe
      - name: Zip the executable
        run: Compress-Archive -Path dist\as6_migration.exe -DestinationPath dist\as6_migration.zip

      # Upload both the .exe and .zip as artifacts for use in the release job
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: migration-artifacts
          path: |
            dist/as6_migration.exe
            dist/as6_migration.zip

  release:
    name: Tag and Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download the artifacts built in the previous job
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: migration-artifacts
          path: dist

      # Get the previous tag, or use initial commit if none exists
      - name: Get previous tag
        id: get_previous_tag
        run: |
          PREV_TAG=$(git tag --sort=-creatordate | head -n 1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "PREV_TAG=$PREV_TAG" >> $GITHUB_ENV

      # Generate a new tag based on the current date and time (UTC)
      - name: Get new tag (date/time)
        id: get_new_tag
        run: echo "NEW_TAG=v$(date -u +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      # Generate release header and changelog
      - name: Generate release notes
        run: |
          echo "✅ This release contains:
- The latest GUI tool (\`as6-migration-tools.zip\`)
- The latest source code (\`source-code.zip\`)

⚠️ *Please ignore the \"Source code (zip/tar.gz)\" links below.*
They are auto-generated by GitHub and may be empty or may not reflect the latest code.

**Changelog:**" > release_body.md

          if [ "${{ env.PREV_TAG }}" = "$(git rev-list --max-parents=0 HEAD)" ]; then
            echo "Initial release" >> release_body.md
          else
            git log --pretty=format:'- %s (%an)' ${{ env.PREV_TAG }}..HEAD >> release_body.md
          fi

      # Create a new tag and push it to GitHub
      - name: Create git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}

      # Create the GitHub Release with changelog and attached files
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          body_path: release_body.md
          files: |
            dist/as6_migration.exe
            dist/as6_migration.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
