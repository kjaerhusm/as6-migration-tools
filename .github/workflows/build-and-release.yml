name: Build and Release

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build Executable
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install CustomTkinter
        run: pip install customtkinter

      - name: Build executable
        run: pyinstaller --noconfirm gui_launcher.spec

      - name: Zip EXE and all contents of dist/
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "dist\as6-migration-tools.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/as6-migration-tools.zip

  release:
    name: Tag and Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create source archive
        uses: TheDoctor0/zip-release@0.7.1
        with:
          filename: source-code.zip
          exclusions: .git, .github, __pycache__, *.pyc

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      - name: Delete previous release (if exists)
        run: gh release delete latest --yes || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new tag (date/time UTC)
        id: get_new_tag
        run: |
          echo "NEW_TAG=v$(date -u +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          cat << 'EOF' > release_body.md
This release contains:
- The latest GUI tool (as6-migration-tools.zip)
- The latest source code (source-code.zip)

NOTE: Please ignore the "Source code (zip/tar.gz)" links below.
They are auto-generated by GitHub and may not reflect the latest code.
EOF

      - name: Create git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "AS6 Migration Tools"
          body_path: release_body.md
          files: |
            release/as6-migration-tools.zip
            source-code.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
