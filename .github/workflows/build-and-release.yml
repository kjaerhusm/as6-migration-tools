name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pyinstaller customtkinter

      - name: Build exe
        run: |
          pyinstaller as6_migration.py --onefile

      - name: Zip exe
        run: |
          Compress-Archive -Path dist\as6_migration.exe -DestinationPath dist\as6_migration.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: |
            dist/as6_migration.exe
            dist/as6_migration.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts
          path: dist

      - id: prev
        name: Get previous tag
        run: |
          PREV=$(git tag --sort=-creatordate | head -n1)
          if [ -z "$PREV" ]; then
            PREV=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "PREVIOUS=$PREV" >> $GITHUB_ENV

      - id: next
        name: Get new tag
        run: |
          NEW=v$(date -u +'%Y.%m.%d-%H%M')
          echo "NEW_TAG=$NEW" >> $GITHUB_ENV

      - name: Generate release notes
        run: |
          echo "This release includes executable and zip artifact" > release_body.md
          echo "" >> release_body.md
          if [ "$PREVIOUS" = "$(git rev-list --max-parents=0 HEAD)" ]; then
            echo "Changelog: initial release" >> release_body.md
          else
            echo "Changelog:" >> release_body.md
            git log --pretty=format:"- %s (%an)" "$PREVIOUS"..HEAD >> release_body.md
          fi

      - name: Create git tag
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.NEW_TAG }}
          name: Release ${{ env.NEW_TAG }}
          body_path: release_body.md
          files: |
            dist/as6_migration.exe
            dist/as6_migration.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
