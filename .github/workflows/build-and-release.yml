name: Build and Release

permissions:
  contents: write

# Ensure only one run per ref at a time (prevents version/tag races)
concurrency:
  group: as6-migration-tools-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [ main ]
    # Do not trigger a new run when the bump commit only touches version.txt
    paths-ignore:
      - 'version.txt'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - id: bump
        name: Read and bump version
        shell: bash
        run: |
          set -Eeuo pipefail
          # Guard: version.txt must exist and contain a single non-negative integer.
          if [[ ! -f version.txt ]]; then
            echo "version.txt is missing. This file is maintained by CI. Do not delete or edit it." >&2
            exit 1
          fi

          VERSION=$(<version.txt)
          if ! [[ "$VERSION" =~ ^[0-9]+$ ]]; then
            echo "Invalid version in version.txt: '$VERSION'." >&2
            exit 1
          fi

          NEW_VERSION=$((VERSION + 1))
          printf '%s\n' "$NEW_VERSION" > version.txt
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit bumped version
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions@github.com"
          git add version.txt
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push

  build:
    needs: prepare
    runs-on: windows-latest
    outputs:
      built_sha: ${{ steps.meta.outputs.sha }}
    steps:
      # Always build from the latest commit on main (includes the bump commit)
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      # Belt-and-suspenders: ensure the bumped version is present
      - name: Ensure bumped version file
        shell: bash
        run: echo "${{ needs.prepare.outputs.version }}" > version.txt

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Requirements
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller --noconfirm gui_launcher.spec

      - name: Zip EXE and all contents of dist/
        shell: pwsh
        run: |
          Compress-Archive -Path "dist\*" -DestinationPath "dist\as6-migration-tools.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/as6-migration-tools.zip

      # Capture the exact commit we built from (pin the release/tag to this)
      - name: Capture built commit SHA
        id: meta
        shell: bash
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  release:
    needs: [build, prepare]
    runs-on: ubuntu-latest
    steps:
      # Check out exactly the commit we built
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.build.outputs.built_sha }}
          fetch-depth: 0

      - name: Download GUI artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: release

      # Sanity check: simulate GitHub's auto "Source code.zip" to catch export-ignore issues early
      - name: Sanity check auto-archive will have content
        run: |
          git archive --format=zip -o /tmp/auto.zip ${{ needs.build.outputs.built_sha }}
          unzip -l /tmp/auto.zip
          COUNT=$(unzip -Z1 /tmp/auto.zip | wc -l)
          if [ "$COUNT" -lt 5 ]; then
            echo "Auto-generated archive looks too small (files: $COUNT). Check .gitattributes export-ignore rules."
            exit 1
          fi

      # Create a versioned release with an immutable, unique tag
      - name: Create GitHub Release (versioned tag)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}              # immutable, unique tag
          target_commitish: ${{ needs.build.outputs.built_sha }}       # pin to built commit
          name: "AS6 Migration Tools v${{ needs.prepare.outputs.version }}"
          make_latest: true                                            # explicitly mark as the latest release
          body: |
            ✅ This release contains:
            - The latest GUI tool (`as6-migration-tools.zip`)
            - Auto-generated source archives by GitHub (see "Source code" links)
          files: |
            release/as6-migration-tools.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
